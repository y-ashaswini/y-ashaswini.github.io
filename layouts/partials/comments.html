<br />
<hr style="border: 0; border-top: 1px solid var(--border); opacity: 0.2;">
<div class="post-interactions" style="margin-bottom: 20px;">
    <div 
      data-lyket-type="like" 
      data-lyket-id="{{ .File.UniqueID }}" 
      data-lyket-namespace="blog"
      data-lyket-template="twitter"
    ></div>
</div>
<script src="https://unpkg.com/@lyket/widget@latest/dist/lyket.js?apiKey=pt_079cc1785368c4aa0029c6a5a4ae6a"></script>
<br />
<hr style="border: 0; border-top: 1px solid var(--border); opacity: 0.2;">
<div class="post-comments">
    <h3 id="comments-title">Comments</h3>
    
    <div id="cusdis_container">
        <div id="cusdis_thread"
          data-host="https://cusdis.com"
          data-app-id="f2866911-f1cc-4b8e-87bd-ec7592a2f642"
          data-page-id="{{ .File.UniqueID }}"
          data-page-url="{{ .Permalink }}"
          data-page-title="{{ .Title }}"
          data-theme="auto"
        ></div>
    </div>
</div>

<script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

<style>
    .post-comments {
        margin-top: 3rem;
        width: 100%;
    }

    #comments-title {
        font-size: 1rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--secondary);
        margin-bottom: 12px;
    }

    /* THE WRAPPER */
    #cusdis_container {
        background: var(--entry); 
        padding: 10px;
        border-radius: 12px;
        transition: all 0.3s ease;
        min-height: 150px;
    }

    /* THE MAGIC: Forcing the iframe to behave */
    #cusdis_thread iframe {
        background: transparent !important;
        /* This filter makes the iframe's internal white parts dark */
        filter: invert(0.9) hue-rotate(180deg) brightness(1.2);
        mix-blend-mode: screen; 
        border-radius: 8px;
    }

    /* LIGHT MODE: Reset the filter so it looks normal */
    [data-theme='light'] #cusdis_thread iframe {
        filter: none;
        mix-blend-mode: normal;
    }

    [data-theme='light'] #cusdis_container {
        background: #f4f4f4;
        border: 1px solid #ddd;
    }
</style>
