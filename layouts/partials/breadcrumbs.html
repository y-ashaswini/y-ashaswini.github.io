{{- if not .IsHome -}}
<div class="breadcrumbs">
    <a href="{{ absLangURL "/" }}">home</a>&nbsp;»&nbsp;
    {{- range .Ancestors.Reverse -}}
        {{- if ne .Title $.Site.Title -}}
            <a href="{{ .Permalink }}">{{ .Title | lower }}</a>&nbsp;»&nbsp;
        {{- end -}}
    {{- end -}}
    <span class="current-page">{{ .Title | lower }}</span>
</div>
{{- end -}}
